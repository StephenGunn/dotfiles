# Host: titan (HP OMEN MAX 16" gaming laptop)
# Dual monitor setup - laptop on left + main monitor on right

################
### MONITORS ###
################

# Internal display (eDP-1) - 2560x1600 @ 240Hz (left, physical)
monitor = eDP-1, 2560x1600@240, 0x0, 1

# Main monitor (HDMI-A-1) - 2560x1440 @ 144Hz (right, physical)
monitor = HDMI-A-1, 2560x1440@144, 2560x0, 1

######################
### WORKSPACES     ###
######################

# Main monitor (HDMI-A-1) - Workspaces 1-5 (left hand binds)
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1

# Laptop display (eDP-1) - Workspaces 6-10 (right hand binds)
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1
