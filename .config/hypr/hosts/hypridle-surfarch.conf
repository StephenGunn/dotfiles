# Hypridle config for surfarch (Surface Pro 8)
# No suspend - this machine runs 24/7 for streaming

general {
    after_sleep_cmd = sh ~/.config/hypr/scripts/restore-after-wake.sh
}

# Dim display after 15 minutes
listener {
    timeout = 900
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Turn off display after 30 minutes (OBS keeps streaming)
listener {
    timeout = 1800
    on-timeout = hyprctl dispatch dpms off && touch /tmp/display-off
    on-resume = hyprctl dispatch dpms on && rm -f /tmp/display-off
}

# No suspend listener - machine stays on for streaming
