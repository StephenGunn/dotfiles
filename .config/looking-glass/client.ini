[input]
; Capture input when window is focused, release when unfocused
captureOnFocus=yes
; Fallback key if needed (Scroll Lock via ZMK layer)
escapeKey=KEY_SCROLLLOCK

[win]
; Borderless for clean Hyprland integration
borderless=yes
; Don't grab keyboard at the Wayland level (lets Hyprland binds work)
noScreensaver=yes

[spice]
; Enable clipboard sharing between host and guest
clipboard=yes
